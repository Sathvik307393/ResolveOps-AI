# This is an example of the secrets file. DO NOT COMMIT REAL SECRETS.
# It is recommended to create secrets via the command line instead:
# kubectl create secret generic resolveops-secrets --from-literal=OPENAI_API_KEY=your-key -n resolveops-ai-dev
apiVersion: v1
kind: Secret
metadata:
  name: resolveops-secrets
  namespace: resolveops-ai-dev
type: Opaque
stringData:
  OPENAI_API_KEY: "dummy-key"
  GITHUB_TOKEN: "dummy-token"
  AWS_ACCESS_KEY_ID: "dummy-aws-key"
  AWS_SECRET_ACCESS_KEY: "dummy-aws-secret"
  AZURE_CLIENT_ID: "dummy-azure-id"
  AZURE_CLIENT_SECRET: "dummy-azure-secret"
  AZURE_TENANT_ID: "dummy-tenant"
