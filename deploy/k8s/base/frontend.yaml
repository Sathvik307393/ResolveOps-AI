apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: resolveops-ai-dev
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: resolveops-service-account
      containers:
        - name: frontend
          image: reolveopsai.azurecr.io/frontend:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: resolveops-config
---
# Frontend is exposed directly for the first AKS test.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: resolveops-ai-dev
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
