name: NexusAI Deployment Sync

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_run:
    workflows: ["Build", "Deploy"]
    types: [completed]

jobs:
  nexus-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Metadata
        id: meta
        run: |
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "commit_msg=$(git log -1 --pretty=%B | head -n 1)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "repo=$GITHUB_REPOSITORY" >> $GITHUB_OUTPUT
          echo "pr_url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT

      - name: Dispatch Deployment Event to NexusAI
        run: |
          curl -X POST "https://nexus-aiops-api.nexusai.sathvikdevops.online/api/v1/github/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.NEXUS_API_KEY }}" \
            -d '{
              "commit_sha": "${{ steps.meta.outputs.commit_sha }}",
              "commit_msg": "${{ steps.meta.outputs.commit_msg }}",
              "author": "${{ steps.meta.outputs.author }}",
              "repository": "${{ steps.meta.outputs.repo }}",
              "workflow_run_id": "${{ github.run_id }}",
              "pr_url": "${{ steps.meta.outputs.pr_url }}"
            }'
