apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: kube-system
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [FILTER]
        Name    nest
        Match   kube.*
        Operation lift
        Nested_under kubernetes

    [FILTER]
        Name          modify
        Match         kube.*
        Condition     Key_Value_Equals stream stderr
        Set           level ERROR

    [FILTER]
        Name          modify
        Match         kube.*
        Condition     Key_Value_Equals stream stdout
        Set           level INFO

    [FILTER]
        Name          nest
        Match         kube.*
        Operation     nest
        Wildcard      *
        Nest_under    event_data

    # Forward payload mapped to the NexusAI ingest schema
    [OUTPUT]
        Name            http
        Match           *
        Host            nexus-aiops-api.nexusai.sathvikdevops.online
        Port            443
        TLS             On
        URI             /api/v1/ingest
        Format          json
        Header          Authorization Bearer ${NEXUS_API_KEY}
        # Add metadata variables
        Header          X-Nexus-Cluster-ID ${CLUSTER_ID}

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<message>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: kube-system
  labels:
    k8s-app: fluent-bit-logging
    version: v1
spec:
  selector:
    matchLabels:
      k8s-app: fluent-bit-logging
  template:
    metadata:
      labels:
        k8s-app: fluent-bit-logging
        version: v1
    spec:
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit:3.0
        env:
        - name: NEXUS_API_KEY
          valueFrom:
            secretKeyRef:
              name: nexus-secret
              key: api-key
        - name: CLUSTER_ID
          value: "aks-prod-cluster-01" # Or eks-prod-cluster-01
        resources:
          limits:
            memory: 250Mi
          requests:
            cpu: 100m
            memory: 100Mi
        volumeMounts:
        - name: varlog
          mountPath: /var/log
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: config
          mountPath: /fluent-bit/etc
      terminationGracePeriodSeconds: 10
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: config
        configMap:
          name: fluent-bit-config
