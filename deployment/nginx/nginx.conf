server {
    listen 80;
    server_name nexusai.sathvikdevops.online;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nexusai.sathvikdevops.online;

    # SSL configuration (Certbot will manage these files on the host machine)
    ssl_certificate /etc/letsencrypt/live/nexusai.sathvikdevops.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexusai.sathvikdevops.online/privkey.pem;

    # Route /api to the FastAPI backend
    location /api/ {
        proxy_pass http://nexus-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route everything else to the Next.js UI
    location / {
        proxy_pass http://nexus-ui:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSockets support for Streamlit
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
