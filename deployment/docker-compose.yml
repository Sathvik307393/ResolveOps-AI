services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - api-gateway-service

  frontend:
    build:
      context: ../frontend
    expose:
      - "3000"
    depends_on:
      - api-gateway-service

  api-gateway-service:
    build:
      context: ../services/api-gateway-service
    expose:
      - "8000"
    env_file:
      - ../.env

  auth-service:
    build:
      context: ../services/auth-service
    expose:
      - "8000"
    env_file:
      - ../.env

  github-intelligence-service:
    build:
      context: ../services/github-intelligence-service
    expose:
      - "8000"
    env_file:
      - ../.env

  azure-intelligence-service:
    build:
      context: ../services/azure-intelligence-service
    expose:
      - "8000"
    env_file:
      - ../.env

  aws-intelligence-service:
    build:
      context: ../services/aws-intelligence-service
    expose:
      - "8000"
    env_file:
      - ../.env

  ai-rca-service:
    build:
      context: ../services/ai-rca-service
    expose:
      - "8000"
    env_file:
      - ../.env

  notification-service:
    build:
      context: ../services/notification-service
    expose:
      - "8000"
    env_file:
      - ../.env

  diagram-report-service:
    build:
      context: ../services/diagram-report-service
    expose:
      - "8000"
    env_file:
      - ../.env

  cost-insights-service:
    build:
      context: ../services/cost-insights-service
    expose:
      - "8000"
    env_file:
      - ../.env
