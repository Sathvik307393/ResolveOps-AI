version: '3.8'

services:
  nexus-api:
    build: .
    container_name: nexus_api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    restart: always

  nexus-ui:
    build: ./frontend
    container_name: nexus_ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://nexusai.sathvikdevops.online/api
    restart: always

  nginx:
    image: nginx:latest
    container_name: nexus_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - nexus-api
      - nexus-ui
    restart: always
