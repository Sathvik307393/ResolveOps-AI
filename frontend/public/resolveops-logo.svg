<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="10" y1="10" x2="70" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="textGrad" x1="100" y1="30" x2="380" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Hexagon Shield Icon -->
  <path d="M40 10 L68 25 V65 L40 80 L12 65 V25 Z" fill="url(#shieldGrad)" opacity="0.15" />
  <path d="M40 10 L68 25 V65 L40 80 L12 65 V25 Z" stroke="url(#shieldGrad)" stroke-width="3" fill="none" />
  
  <!-- Abstract 'R' & Pulse Line -->
  <path d="M28 35 V65 M28 35 H45 C52 35 52 48 45 48 H28 M40 48 L52 65" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <circle cx="28" cy="35" r="3" fill="#06b6d4" />

  <!-- Pulse / Connection node -->
  <path d="M55 40 L65 30 H75" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <circle cx="75" cy="30" r="2" fill="#06b6d4" />

  <!-- ResolveOps Text -->
  <text x="95" y="62" font-family="'Inter', 'Roboto', sans-serif" font-weight="700" font-size="36" fill="url(#textGrad)" letter-spacing="-0.5">ResolveOps</text>
  
  <!-- AI Text -->
  <text x="305" y="62" font-family="'Inter', 'Roboto', sans-serif" font-weight="800" font-size="36" fill="url(#aiGrad)" letter-spacing="-0.5">AI</text>
</svg>
